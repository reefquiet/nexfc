<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Nexfy Remote (Projectivy Style)</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    :root {
      --main-color: #fff;
      --main-bg-color: #121212;
      --accent: #bb86fc;
      --main-bg-sec-color: rgba(0,0,0,0.3);
      --font-size: 10vmin;
      --font-size-neg: -5vmin;
      --footer-size: 12vmax;
      --remote-size: 70vmin;
    }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      background: var(--main-bg-color);
      color: var(--main-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      touch-action: manipulation;
    }

    /* Header & Status */
    .header { width: 100%; padding: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; position: relative; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 5px #ff4444; }
    .status-online { background: #44ff44; box-shadow: 0 0 8px #44ff44; }

    /* D-Pad Style */
    .remote {
      width: var(--remote-size);
      height: var(--remote-size);
      background: var(--main-bg-sec-color);
      border-radius: 50%;
      position: relative;
      box-shadow: 0px 0px 25px 0px #000;
      border: 1px solid #333;
    }
    .remote a {
      position: absolute;
      color: var(--main-color);
      text-decoration: none;
      font-size: var(--font-size);
      display: flex; align-items: center; justify-content: center;
      width: 30%; height: 30%;
    }
    .remote a:active { transform: scale(0.9); opacity: 0.7; }

    a.up { top: 5%; left: 35%; }
    a.down { bottom: 5%; left: 35%; }
    a.left { top: 35%; left: 5%; }
    a.right { top: 35%; right: 5%; }
    a.enter {
      top: 35%; left: 35%; width: 30%; height: 30%;
      background: var(--accent);
      border-radius: 50%;
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* Input & NexAi Section */
    .input-section {
      width: 90%; max-width: 400px;
      display: flex; flex-direction: column; gap: 10px;
      margin-bottom: 20px;
    }
    .input-box {
      display: flex; background: #222; border-radius: 20px; padding: 5px 15px;
      align-items: center; border: 1px solid #333;
    }
    input {
      flex: 1; background: transparent; border: none; color: white;
      padding: 10px; font-size: 16px; outline: none;
    }
    .mic-btn { font-size: 24px; cursor: pointer; padding: 5px; color: var(--accent); border:none; background:none; }
    .mic-active { color: #ff4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    /* Buttons Grid */
    .btn-row { width: 100%; display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
    .btn-rect {
      background: #252525; color: white; border: 1px solid #333;
      border-radius: 12px; padding: 12px 20px; font-weight: bold;
      min-width: 80px; text-align: center;
    }
    .btn-rect:active { background: #333; }

    /* Footer */
    footer { background: rgba(0,0,0,0.4); width: 100%; padding: 10px 0; border-top: 1px solid #333; }
    footer ul { display: flex; justify-content: space-around; list-style: none; padding: 0; margin: 0; }
    footer li a { color: var(--main-color); font-size: 32px; }

    /* Error Overlay */
    #errorOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 100;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 20px; box-sizing: border-box;
    }
    .auth-btn {
      background: #ff4444; color: white; border: none; padding: 15px 30px;
      border-radius: 25px; font-weight: bold; margin-top: 20px; font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="errorOverlay">
    <h2 style="color: #ff4444;">⚠️ BAĞLANTI HATASI</h2>
    <p>Tarayıcı TV'ye güvenli bağlanamadı.<br>Mikrofonun çalışması için TV'ye onay vermeniz gerekiyor.</p>
    <button class="auth-btn" onclick="authorize()">TV'YE ONAY VER</button>
    <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">(Açılan sayfada Gelişmiş > İlerle deyin)</p>
  </div>

  <div class="header">
    <div id="statusDot" class="status-dot"></div>
    <span>NEXFY REMOTE</span>
  </div>

  <div class="input-section">
    <div class="input-box">
      <button id="micBtn" class="mic-btn" onclick="toggleVoice('TEXT')">mic</button>
      <input type="text" id="textInput" placeholder="TV'ye yaz...">
      <button style="background:none; border:none; color:var(--accent); font-weight:bold;" onclick="sendText()">Yolla</button>
    </div>
    <div class="btn-row">
      <div class="btn-rect" onclick="send('VOL-')">VOL -</div>
      <div class="btn-rect" onclick="toggleVoice('NEXAI_CMD')" style="color: var(--accent); border-color: var(--accent);">NEXAI</div>
      <div class="btn-rect" onclick="send('VOL+')">VOL +</div>
    </div>
  </div>

  <div class="remote">
    <a class="material-icons up" href="javascript:send('UP');">arrow_drop_up</a>
    <a class="material-icons left" href="javascript:send('LEFT');">arrow_left</a>
    <a class="material-icons right" href="javascript:send('RIGHT');">arrow_right</a>
    <a class="material-icons down" href="javascript:send('DOWN');">arrow_drop_down</a>
    <a class="enter" href="javascript:send('SELECT');"></a>
  </div>

  <div style="margin: 20px 0;">
    <div class="btn-row">
      <div class="btn-rect" onclick="launch('com.google.android.youtube.tv')">YOUTUBE</div>
      <div class="btn-rect" onclick="send('MUTE')">MUTE</div>
      <div class="btn-rect" onclick="send('MENU')">MENU</div>
    </div>
  </div>

  <footer>
    <ul>
      <li><a class="material-icons" href="javascript:send('BACK');">arrow_back</a></li>
      <li><a class="material-icons" href="javascript:send('HOME');">home</a></li>
      <li><a class="material-icons" href="javascript:send('MENU');">apps</a></li>
    </ul>
  </footer>

  <!-- Fallback Iframe (MiReCo Style) -->
  <iframe id="fallbackFrame" style="display:none;"></iframe>

  <script>
    let ws;
    let targetIp = '';
    const statusDot = document.getElementById('statusDot');
    const micBtn = document.getElementById('micBtn');
    const errorOverlay = document.getElementById('errorOverlay');
    const fallbackFrame = document.getElementById('fallbackFrame');

    function init() {
      // IP'yi # veya ? parametresinden al, yoksa hafızadan oku
      const urlParams = new URLSearchParams(window.location.search);
      const hashIp = window.location.hash.substring(1);
      targetIp = hashIp || urlParams.get('ip') || localStorage.getItem('last_ip');

      if (targetIp) {
        localStorage.setItem('last_ip', targetIp);
        connect();
      } else {
        alert("IP Adresi bulunamadı! Lütfen QR kodu tekrar taratın.");
      }
    }

    function connect() {
      console.log('Connecting to:', targetIp);
      ws = new WebSocket(`wss://${targetIp}:8888/ws`);

      ws.onopen = () => {
        statusDot.classList.add('status-online');
        errorOverlay.style.display = 'none';
      };

      ws.onerror = () => {
        // WebSocket başarısızsa hata panelini göster
        errorOverlay.style.display = 'flex';
      };

      ws.onclose = () => {
        statusDot.classList.remove('status-online');
        setTimeout(connect, 3000);
      };
    }

    function send(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ command: cmd }));
      } else {
        // FALLBACK: Projectivy/MiReCo stili HTTP GET
        const action = cmd.toLowerCase();
        fallbackFrame.src = `http://${targetIp}:8889/controller?action=keyevent&keycode=${action}`;
      }
      if (window.navigator.vibrate) window.navigator.vibrate(25);
    }

    function sendText() {
      const input = document.getElementById('textInput');
      if (input.value && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ command: 'TEXT', text: input.value }));
        input.value = '';
      }
    }

    function launch(pkg) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ command: 'LAUNCH', text: pkg }));
      } else {
        fallbackFrame.src = `http://${targetIp}:8889/controller?action=startapp&packagename=${pkg}`;
      }
    }

    function authorize() {
      window.open(`https://${targetIp}:8888/test`, '_blank');
    }

    // Voice
    let recognition;
    let activeMode = 'TEXT';
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.lang = 'tr-TR';

      recognition.onstart = () => micBtn.classList.add('mic-active');
      recognition.onend = () => micBtn.classList.add('mic-active');
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        if (activeMode === 'NEXAI_CMD') {
          ws.send(JSON.stringify({ command: 'NEXAI_CMD', text: text }));
        } else {
          document.getElementById('textInput').value = text;
          sendText();
        }
      };
    }

    function toggleVoice(mode) {
      if (!recognition) return alert("Ses tanıma desteklenmiyor.");
      activeMode = mode;
      if (mode === 'NEXAI_CMD') ws.send(JSON.stringify({ command: 'NEXAI' }));
      recognition.start();
    }

    init();
  </script>
</body>
</html>
